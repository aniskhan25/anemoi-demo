defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - hardware: example
  - graph: multi_scale
  - model: gnn
  - training: default
  - _self_

# This file follows the documented Anemoi config groups and required
# overrides. Replace every `???` with a concrete value before running.

data:
  resolution: ???

hardware:
  num_gpus_per_node: 1
  paths:
    data: ${oc.env:ANEMOI_DATA_ROOT}
    graph: ${oc.env:ANEMOI_GRAPH_ROOT}
    output: ${oc.env:ANEMOI_OUTPUT_ROOT}
  files:
    dataset: ???
    graph: ???

dataloader:
  num_workers:
    training: 0
    validation: 0
    test: 0
  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: 8
    validation: 2
    test: 2

training:
  lr:
    rate: 1.0e-4
