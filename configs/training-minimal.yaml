defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - graph: multi_scale
  - model: gnn
  - system: example
  - training: default
  - _self_

# This file follows the documented Anemoi config groups and required
# overrides. Replace every `???` with a concrete value before running.

config_validation: true

data:
  resolution: ???

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  output:
    root: ${oc.env:ANEMOI_OUTPUT_ROOT}
  input:
    dataset: ???
    graph: ???

dataloader:
  num_workers:
    training: 0
    validation: 0
    test: 0
  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: 8
    validation: 2
    test: 2

training:
  lr:
    rate: 1.0e-4
